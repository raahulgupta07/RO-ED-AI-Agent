services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ro-ed-api
    ports:
      - "9000:9000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in environment}
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
    driver: local
